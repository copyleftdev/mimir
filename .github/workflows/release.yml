name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mimir-Linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mimir-Linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mimir-Darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mimir-Darwin-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin mimir

      - name: Strip binary (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/mimir
          else
            strip target/${{ matrix.target }}/release/mimir
          fi

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/mimir

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/mimir ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mimir-Linux-x86_64/mimir-Linux-x86_64
            artifacts/mimir-Linux-x86_64/mimir-Linux-x86_64.sha256
            artifacts/mimir-Linux-aarch64/mimir-Linux-aarch64
            artifacts/mimir-Linux-aarch64/mimir-Linux-aarch64.sha256
            artifacts/mimir-Darwin-x86_64/mimir-Darwin-x86_64
            artifacts/mimir-Darwin-x86_64/mimir-Darwin-x86_64.sha256
            artifacts/mimir-Darwin-aarch64/mimir-Darwin-aarch64
            artifacts/mimir-Darwin-aarch64/mimir-Darwin-aarch64.sha256
